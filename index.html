<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#10b981">
    <title>TradeWatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060a10;
            --bg-card: #0c1018;
            --bg-surface: #111820;
            --green: #10b981;
            --green-dim: rgba(16,185,129,0.15);
            --amber: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a78bfa;
            --text: #f1f5f9;
            --text-dim: #64748b;
            --border: rgba(255,255,255,0.06);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; height: 100dvh; }

        /* ── APP SHELL ── */
        .app { display: flex; flex-direction: column; height: 100dvh; }

        /* ── HEADER ── */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            flex-shrink: 0; z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-mark {
            width: 28px; height: 28px; border-radius: 8px;
            background: linear-gradient(135deg, var(--green), #059669);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 11px; color: #000; letter-spacing: -0.5px;
        }
        .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.5px; }
        .logo-text span { color: var(--green); }

        /* ── TABS ── */
        .tabs { display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 3px; }
        .tab-btn {
            padding: 6px 16px; border-radius: 8px; border: none; background: none;
            color: var(--text-dim); font-family: var(--font); font-size: 12px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--green); color: #000; }
        .tab-btn:not(.active):hover { color: var(--text); }

        /* ── SETTINGS BUTTON ── */
        .settings-btn {
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            font-size: 18px; padding: 4px 8px; border-radius: 6px;
        }
        .settings-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

        /* ── TAB PANELS ── */
        .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .tab-panel.active { display: flex; }

        /* ── CHART CONTROLS ── */
        .chart-controls {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; flex-shrink: 0;
        }
        .asset-toggles { display: flex; gap: 6px; }
        .asset-toggle {
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
            background: none; font-family: var(--font); font-size: 11px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .asset-toggle.btc { color: var(--amber); border-color: rgba(245,158,11,0.25); }
        .asset-toggle.btc.active { background: rgba(245,158,11,0.15); border-color: var(--amber); }
        .asset-toggle.oil { color: var(--blue); border-color: rgba(59,130,246,0.25); }
        .asset-toggle.oil.active { background: rgba(59,130,246,0.15); border-color: var(--blue); }
        .asset-toggle.spx { color: var(--green); border-color: rgba(16,185,129,0.25); }
        .asset-toggle.spx.active { background: rgba(16,185,129,0.15); border-color: var(--green); }

        .tf-btns { display: flex; gap: 2px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 2px; }
        .tf-btn {
            padding: 4px 10px; border-radius: 6px; border: none; background: none;
            color: var(--text-dim); font-family: var(--font); font-size: 11px;
            font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .tf-btn.active { background: rgba(255,255,255,0.1); color: var(--text); }

        /* ── CHART CONTAINER ── */
        .chart-area { flex: 1; position: relative; min-height: 0; }
        #chartBox { width: 100%; height: 100%; }

        /* ── CHART LEGEND (floating) ── */
        .chart-legend {
            position: absolute; top: 8px; left: 16px; z-index: 5;
            display: flex; gap: 16px; font-size: 11px; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        .legend-val { font-weight: 700; font-variant-numeric: tabular-nums; }

        /* ── EVENT TOOLTIP ── */
        .event-tooltip {
            position: absolute; z-index: 20; pointer-events: none;
            max-width: 320px; padding: 14px 16px;
            background: rgba(12,16,24,0.96); border: 1px solid var(--border);
            border-radius: 12px; backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            opacity: 0; transition: opacity 0.15s;
        }
        .event-tooltip.visible { opacity: 1; }
        .event-tooltip-date { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
        .event-tooltip-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .event-tooltip-summary { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
        .event-tooltip-tag {
            display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; padding: 2px 6px; border-radius: 4px;
            margin-top: 8px;
        }

        /* ── CROSSHAIR VALUES ── */
        .crosshair-values {
            position: absolute; top: 8px; right: 16px; z-index: 5;
            text-align: right; pointer-events: none;
        }
        .xh-date { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
        .xh-row { font-size: 12px; font-weight: 600; }

        /* ── CORRELATION STATS BAR ── */
        .corr-bar {
            display: flex; gap: 12px; justify-content: center; align-items: center;
            padding: 8px 16px; border-top: 1px solid var(--border);
            flex-shrink: 0; font-size: 11px;
        }
        .corr-stat { display: flex; align-items: center; gap: 4px; }
        .corr-stat-label { color: var(--text-dim); }
        .corr-stat-val { font-weight: 700; font-variant-numeric: tabular-nums; }

        /* ── LOADING ── */
        .loading-overlay {
            position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; background: var(--bg); z-index: 30;
        }
        .loading-spinner {
            width: 32px; height: 32px; border: 3px solid var(--border);
            border-top-color: var(--green); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── COMING SOON ── */
        .coming-soon {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 8px; color: var(--text-dim);
        }
        .coming-soon-icon { font-size: 40px; opacity: 0.3; }
        .coming-soon-text { font-size: 14px; font-weight: 600; }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .header { padding: 10px 12px; }
            .tab-btn { padding: 5px 10px; font-size: 11px; }
            .chart-controls { padding: 8px 12px; }
            .asset-toggle { padding: 4px 10px; font-size: 10px; }
            .tf-btn { padding: 3px 8px; font-size: 10px; }
            .event-tooltip { max-width: 260px; padding: 10px 12px; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <div class="logo-mark">TW</div>
            <div class="logo-text"><span>Trade</span>Watch</div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('historical')">Historical</button>
            <button class="tab-btn" onclick="switchTab('projected')">Projected</button>
            <button class="tab-btn" onclick="switchTab('impact')">Impact</button>
        </div>
        <button class="settings-btn" title="Settings">&#9881;</button>
    </div>

    <!-- TAB 1: HISTORICAL -->
    <div class="tab-panel active" id="tab-historical">
        <div class="chart-controls">
            <div class="asset-toggles">
                <button class="asset-toggle btc active" onclick="toggleAsset('btc')">&#9679; BTC</button>
                <button class="asset-toggle oil active" onclick="toggleAsset('oil')">&#9679; WTI Oil</button>
                <button class="asset-toggle spx" onclick="toggleAsset('spx')">&#9679; S&amp;P 500</button>
            </div>
            <div class="tf-btns">
                <button class="tf-btn" onclick="setTimeframe(1)">1Y</button>
                <button class="tf-btn active" onclick="setTimeframe(2)">2Y</button>
                <button class="tf-btn" onclick="setTimeframe(5)">5Y</button>
                <button class="tf-btn" onclick="setTimeframe(0)">All</button>
            </div>
        </div>
        <div class="chart-area">
            <div id="chartBox"></div>
            <div class="chart-legend" id="chartLegend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--amber);"></div>BTC <span class="legend-val" id="legBtc"></span></div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--blue);"></div>WTI <span class="legend-val" id="legOil"></span></div>
                <div class="legend-item" id="legSpxWrap" style="display:none;"><div class="legend-dot" style="background:var(--green);"></div>S&amp;P <span class="legend-val" id="legSpx"></span></div>
            </div>
            <div class="crosshair-values" id="xhValues"></div>
            <div class="event-tooltip" id="eventTooltip"></div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
            </div>
        </div>
        <div class="corr-bar" id="corrBar">
            <div class="corr-stat">
                <span class="corr-stat-label">BTC/Oil correlation:</span>
                <span class="corr-stat-val" id="corrBtcOil">—</span>
            </div>
            <div class="corr-stat">
                <span class="corr-stat-label">Rolling 90d:</span>
                <span class="corr-stat-val" id="corrRolling">—</span>
            </div>
        </div>
    </div>

    <!-- TAB 2: PROJECTED -->
    <div class="tab-panel" id="tab-projected">
        <div class="coming-soon">
            <div class="coming-soon-icon">&#128302;</div>
            <div class="coming-soon-text">Scenario Projections — Coming Next</div>
        </div>
    </div>

    <!-- TAB 3: IMPACT -->
    <div class="tab-panel" id="tab-impact">
        <div class="coming-soon">
            <div class="coming-soon-icon">&#128176;</div>
            <div class="coming-soon-text">Financial Impact — Coming Next</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="events-db.js"></script>
<script src="geo-intel.js"></script>
<script>
// ================================================================
// STATE
// ================================================================
let chart, btcSeries, oilSeries, spxSeries;
let rawBtc = [], rawOil = [], rawSpx = [];
let normBtc = [], normOil = [], normSpx = [];
let activeAssets = { btc: true, oil: true, spx: false };
let currentTf = 2;
let eventMarkers = [];

// ================================================================
// TAB SWITCHING
// ================================================================
function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
    if (name === 'historical' && chart) chart.timeScale().fitContent();
}

// ================================================================
// ASSET TOGGLES
// ================================================================
function toggleAsset(asset) {
    activeAssets[asset] = !activeAssets[asset];
    const btn = document.querySelector(`.asset-toggle.${asset}`);
    btn.classList.toggle('active');
    const series = { btc: btcSeries, oil: oilSeries, spx: spxSeries }[asset];
    if (series) series.applyOptions({ visible: activeAssets[asset] });
    document.getElementById('legSpxWrap').style.display = activeAssets.spx ? '' : 'none';
    updateCorrelation();
}

// ================================================================
// TIMEFRAME
// ================================================================
function setTimeframe(years) {
    currentTf = years;
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tf-btn[onclick*="${years}"]`).classList.add('active');
    applyTimeframe();
}

function applyTimeframe() {
    if (!rawBtc.length) return;
    let startDate;
    if (currentTf === 0) {
        startDate = rawBtc[0]?.time;
    } else {
        const d = new Date();
        d.setFullYear(d.getFullYear() - currentTf);
        startDate = d.toISOString().slice(0, 10);
    }

    normBtc = normalize(rawBtc, startDate);
    normOil = normalize(rawOil, startDate);
    normSpx = normalize(rawSpx, startDate);

    btcSeries.setData(normBtc);
    oilSeries.setData(normOil);
    spxSeries.setData(normSpx);

    addEventMarkers(startDate);
    chart.timeScale().fitContent();
    updateCorrelation();
}

function normalize(series, startDate) {
    const idx = series.findIndex(p => p.time >= startDate);
    if (idx < 0) return [];
    const base = series[idx].value;
    if (!base) return [];
    return series.slice(idx).map(p => ({
        time: p.time,
        value: +( ((p.value - base) / base) * 100 ).toFixed(2)
    }));
}

// ================================================================
// CORRELATION
// ================================================================
function pearson(a, b) {
    const mapA = new Map(a.map(p => [p.time, p.value]));
    const pairs = b.filter(p => mapA.has(p.time)).map(p => [mapA.get(p.time), p.value]);
    if (pairs.length < 10) return null;
    const xs = pairs.map(p => p[0]), ys = pairs.map(p => p[1]);
    const mx = xs.reduce((s, v) => s + v, 0) / xs.length;
    const my = ys.reduce((s, v) => s + v, 0) / ys.length;
    const num = xs.reduce((s, v, i) => s + (v - mx) * (ys[i] - my), 0);
    const den = Math.sqrt(xs.reduce((s, v) => s + (v - mx) ** 2, 0) * ys.reduce((s, v) => s + (v - my) ** 2, 0));
    return den === 0 ? 0 : num / den;
}

function updateCorrelation() {
    const full = pearson(normBtc, normOil);
    document.getElementById('corrBtcOil').textContent = full != null ? full.toFixed(3) : '—';
    document.getElementById('corrBtcOil').style.color = full > 0.3 ? 'var(--green)' : full < -0.3 ? 'var(--red)' : 'var(--text)';

    const last90 = normBtc.slice(-90);
    const rolling = pearson(last90, normOil.slice(-90));
    document.getElementById('corrRolling').textContent = rolling != null ? rolling.toFixed(3) : '—';
    document.getElementById('corrRolling').style.color = rolling > 0.3 ? 'var(--green)' : rolling < -0.3 ? 'var(--red)' : 'var(--text)';
}

// ================================================================
// EVENT MARKERS
// ================================================================
function addEventMarkers(startDate) {
    const start = startDate || '2000-01-01';
    eventMarkers = GEO_EVENTS
        .filter(e => e.date >= start)
        .filter(e => e.assets.includes('BTC') || e.assets.includes('OIL'))
        .map(e => ({
            time: e.date,
            position: 'aboveBar',
            color: e.color || '#f59e0b',
            shape: 'circle',
            size: 0.8,
            text: '',
            id: e.date
        }));
    if (btcSeries && activeAssets.btc) btcSeries.setMarkers(eventMarkers);
    else if (oilSeries && activeAssets.oil) oilSeries.setMarkers(eventMarkers);
}

// ================================================================
// EVENT TOOLTIP
// ================================================================
function showEventTooltip(event, x, y) {
    const tip = document.getElementById('eventTooltip');
    const cat = GEO_CATEGORIES[event.category] || { label: event.category, color: '#888' };
    tip.innerHTML = `
        <div class="event-tooltip-date">${formatDate(event.date)}</div>
        <div class="event-tooltip-label" style="color:${event.color || cat.color}">${event.label}</div>
        <div class="event-tooltip-summary">${event.summary}</div>
        <span class="event-tooltip-tag" style="background:${cat.color}20;color:${cat.color}">${cat.label}</span>
    `;
    const chartArea = document.querySelector('.chart-area');
    const rect = chartArea.getBoundingClientRect();
    let left = x - rect.left + 12;
    let top = y - rect.top - 20;
    if (left + 320 > rect.width) left = left - 340;
    if (top < 10) top = 10;
    if (top + 200 > rect.height) top = rect.height - 210;
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
    tip.classList.add('visible');
}

function hideEventTooltip() {
    document.getElementById('eventTooltip').classList.remove('visible');
}

function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ================================================================
// CROSSHAIR
// ================================================================
function setupCrosshair() {
    chart.subscribeCrosshairMove(param => {
        if (!param.time || !param.seriesData) {
            document.getElementById('xhValues').innerHTML = '';
            hideEventTooltip();
            return;
        }

        const dateStr = typeof param.time === 'string' ? param.time
            : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;

        const btcVal = param.seriesData.get(btcSeries)?.value;
        const oilVal = param.seriesData.get(oilSeries)?.value;
        const spxVal = param.seriesData.get(spxSeries)?.value;

        let html = `<div class="xh-date">${formatDate(dateStr)}</div>`;
        if (activeAssets.btc && btcVal != null)
            html += `<div class="xh-row" style="color:var(--amber)">BTC ${btcVal >= 0 ? '+' : ''}${btcVal.toFixed(1)}%</div>`;
        if (activeAssets.oil && oilVal != null)
            html += `<div class="xh-row" style="color:var(--blue)">OIL ${oilVal >= 0 ? '+' : ''}${oilVal.toFixed(1)}%</div>`;
        if (activeAssets.spx && spxVal != null)
            html += `<div class="xh-row" style="color:var(--green)">S&P ${spxVal >= 0 ? '+' : ''}${spxVal.toFixed(1)}%</div>`;
        document.getElementById('xhValues').innerHTML = html;

        // Check for nearby event
        const event = GEO_EVENTS.find(e => e.date === dateStr);
        if (event) {
            const point = param.point;
            if (point) {
                const chartArea = document.querySelector('.chart-area');
                const rect = chartArea.getBoundingClientRect();
                showEventTooltip(event, rect.left + point.x, rect.top + point.y);
            }
        } else {
            hideEventTooltip();
        }
    });
}

// ================================================================
// CHART INIT
// ================================================================
async function initChart() {
    const container = document.getElementById('chartBox');

    chart = LightweightCharts.createChart(container, {
        layout: {
            background: { type: 'solid', color: 'transparent' },
            textColor: '#64748b',
            fontFamily: 'Inter, sans-serif',
            fontSize: 11,
        },
        grid: {
            vertLines: { color: 'rgba(255,255,255,0.03)' },
            horzLines: { color: 'rgba(255,255,255,0.04)' },
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { color: 'rgba(255,255,255,0.15)', width: 1, style: 2, labelBackgroundColor: '#1e293b' },
            horzLine: { color: 'rgba(255,255,255,0.15)', width: 1, style: 2, labelBackgroundColor: '#1e293b' },
        },
        rightPriceScale: {
            borderColor: 'rgba(255,255,255,0.06)',
            scaleMargins: { top: 0.1, bottom: 0.1 },
        },
        timeScale: {
            borderColor: 'rgba(255,255,255,0.06)',
            rightOffset: 5,
            barSpacing: 6,
            minBarSpacing: 2,
        },
        handleScroll: { vertTouchDrag: true },
        handleScale: { axisPressedMouseMove: true },
    });

    // Responsive
    const ro = new ResizeObserver(() => {
        chart.applyOptions({ width: container.offsetWidth, height: container.offsetHeight });
    });
    ro.observe(container);

    // Zero line as a separate baseline series
    const zeroLine = chart.addBaselineSeries({
        baseValue: { type: 'price', price: 0 },
        topLineColor: 'transparent', bottomLineColor: 'transparent',
        topFillColor1: 'transparent', topFillColor2: 'transparent',
        bottomFillColor1: 'transparent', bottomFillColor2: 'transparent',
        priceLineVisible: true, priceLineColor: 'rgba(255,255,255,0.12)',
        priceLineStyle: 0, priceLineWidth: 1,
        lastValueVisible: false,
    });
    zeroLine.setData([{ time: '2010-01-01', value: 0 }, { time: '2030-01-01', value: 0 }]);

    // BTC series
    btcSeries = chart.addLineSeries({
        color: '#f59e0b',
        lineWidth: 2,
        priceLineVisible: false,
        lastValueVisible: false,
        crosshairMarkerRadius: 4,
        crosshairMarkerBorderColor: '#f59e0b',
        crosshairMarkerBackgroundColor: '#f59e0b',
    });

    // Oil series
    oilSeries = chart.addLineSeries({
        color: '#3b82f6',
        lineWidth: 2,
        priceLineVisible: false,
        lastValueVisible: false,
        crosshairMarkerRadius: 4,
        crosshairMarkerBorderColor: '#3b82f6',
        crosshairMarkerBackgroundColor: '#3b82f6',
    });

    // S&P series (hidden by default)
    spxSeries = chart.addLineSeries({
        color: '#10b981',
        lineWidth: 2,
        priceLineVisible: false,
        lastValueVisible: false,
        visible: false,
        crosshairMarkerRadius: 4,
        crosshairMarkerBorderColor: '#10b981',
        crosshairMarkerBackgroundColor: '#10b981',
    });

    setupCrosshair();

    // Fetch data
    const [btcRaw, oilRaw, spxRaw] = await Promise.all([
        GeoIntel.fetchBTCHistory(),
        GeoIntel.fetchFREDSeries('DCOILWTICO', '2010-01-01'),
        GeoIntel.fetchFREDSeries('SP500', '2010-01-01'),
    ]);

    rawBtc = btcRaw || [];
    rawOil = oilRaw || [];
    rawSpx = spxRaw || [];

    // Hide loading
    document.getElementById('loadingOverlay').style.display = 'none';

    // Apply default timeframe
    applyTimeframe();
}

// ================================================================
// BOOT
// ================================================================
initChart();
</script>
</body>
</html>
