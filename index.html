<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeRadar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  html, body { margin: 0; padding: 0; background: #07090C; font-family: 'Inter Tight', system-ui, sans-serif; color: rgba(235,238,244,0.95); min-height: 100vh; }
  * { box-sizing: border-box; }
  @keyframes tw-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  #root { width: 100%; min-height: 100vh; }
  .tr-shell { min-width: 1280px; min-height: 820px; }
  .tr-nav-btn:hover { background: #171C24 !important; color: rgba(235,238,244,0.95) !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<!-- Legacy engine — exposes LiveData, NewsFeed, HISTORICAL_EVENTS, Correlation,
     AIAnalysis, Backtester, TechnicalAnalysis, OnChainData, DeFiData,
     DerivativesData, BlackScholes, MonteCarlo, VOLATILITY_DB, CRYPTO_SCENARIOS
     as globals. Screens read from these via window.TR_LIVE (set below). -->
<script src="engine.js"></script>
</head>
<body>
<div id="root"></div>
<!-- Auto-update hook + settings sheet -->
<script type="text/babel" src="tr-hooks.jsx"></script>
<script type="text/babel" src="tr-header-extras.jsx"></script>
<!-- Local-only key bootstrap (gitignored) — pre-fills localStorage.tr_settings
     so the Settings sheet loads with JJ's API keys on first page load. -->
<script src="keys.local.js"></script>
<script type="text/babel" src="screens/summary.jsx"></script>
<script type="text/babel" src="screens/historical.jsx"></script>
<script type="text/babel" src="screens/projected.jsx"></script>
<script type="text/babel" src="screens/impact.jsx"></script>
<script type="text/babel" src="screens/recommendations.jsx"></script>
<script type="text/babel" src="screens/news.jsx"></script>
<script type="text/babel" src="screens/calendar.jsx"></script>
<script type="text/babel" src="screens/signals.jsx"></script>
<script type="text/babel" src="screens/prices.jsx"></script>
<script type="text/babel" src="screens/flights.jsx"></script>
<script type="text/babel">
// TradeRadar app shell — unified 7-tab nav. Screens that accept onNav route via
// the top-level state. Standalone screens (News / Calendar / Signals) are
// wrapped with a matching nav bar so all 7 tabs navigate consistently.

const TR_TOKENS = {
  ink000: '#07090C', ink100: '#0B0E13', ink200: '#10141B', ink300: '#171C24', ink400: '#1E2430',
  edge: 'rgba(255,255,255,0.06)', edgeHi: 'rgba(255,255,255,0.10)',
  text: '#ffffff', textMid: 'rgba(180,188,200,0.75)', textDim: 'rgba(130,138,150,0.55)',
  signal: '#c9a227',
  ui: 'InterTight, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace',
};

const TR_TABS = [
  { key: 'summary',     label: 'Summary'     },
  { key: 'historical',  label: 'Historical'  },
  { key: 'projected',   label: 'Projected'   },
  { key: 'impact',      label: 'Impact'      },
  { key: 'recommend',   label: 'Recommend'   },
  { key: 'news',        label: 'News'        },
  { key: 'calendar',    label: 'Calendar'    },
  { key: 'signals',     label: 'Signals'     },
  { key: 'prices',      label: 'Prices'      },
  { key: 'flights',     label: 'Flights'     },
];

function TRHeader({ tab, onNav, onOpenSettings }) {
  const T = TR_TOKENS;
  return (
    <div style={{
      height: 52, display: 'flex', alignItems: 'center',
      padding: '0 20px', borderBottom: `1px solid ${T.edge}`,
      background: T.ink100,
    }}>
      <img src="assets/gg-logo.png" alt="Global Gauntlet"
        style={{ width: 44, height: 44, objectFit: 'contain', filter: 'drop-shadow(0 0 10px rgba(201,162,39,0.28))' }} />
      <div style={{ marginLeft: 12, fontSize: 15, fontWeight: 500, color: T.text, letterSpacing: 0.2 }}>TradeRadar</div>

      <div style={{
        marginLeft: 32, display: 'flex', padding: 3,
        background: T.ink200, borderRadius: 10, border: `1px solid ${T.edge}`,
        height: 34, alignItems: 'center',
      }}>
        {TR_TABS.map((t, idx) => {
          const active = t.key === tab;
          return (
            <div key={t.key} className="tr-nav-btn"
              onClick={() => !active && onNav && onNav(t.key)}
              style={{
                padding: '0 12px', height: 28, display: 'flex', alignItems: 'center', gap: 6,
                fontSize: 12.5, fontWeight: 500, borderRadius: 7,
                background: active ? T.ink400 : 'transparent',
                color: active ? T.text : T.textMid,
                boxShadow: active ? 'inset 0 0.5px 0 rgba(255,255,255,0.12), 0 1px 2px rgba(0,0,0,0.4)' : 'none',
                cursor: active ? 'default' : 'pointer',
                transition: 'background 120ms cubic-bezier(0.2,0.7,0.2,1), color 120ms cubic-bezier(0.2,0.7,0.2,1)',
              }}>
              <span style={{
                fontFamily: T.mono, fontSize: 10, color: active ? T.signal : T.textDim,
                fontWeight: 600, letterSpacing: 0.3,
              }}>{idx + 1}.</span>
              {t.label}
            </div>
          );
        })}
      </div>

      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 16 }}>
        <TRLiveStrip />
        <div style={{ fontFamily: T.mono, fontSize: 11, color: T.textMid, letterSpacing: 0.4 }}>
          <span style={{ color: T.signal, animation: 'tw-pulse 2s ease-in-out infinite' }}>●</span>&nbsp; LIVE
        </div>
        <TRGearButton onClick={onOpenSettings} />
      </div>
    </div>
  );
}

// Polls engine.js LiveData every 60s and renders BTC spot + 24h change + Fear&Greed.
// Non-destructive: if engine globals or fetches fail, renders nothing.
function TRLiveStrip() {
  const T = TR_TOKENS;
  const [btc, setBtc]   = React.useState(null);   // { price, change24h }
  const [fng, setFng]   = React.useState(null);   // { value, classification }

  React.useEffect(() => {
    let active = true;
    async function tick() {
      try {
        if (typeof LiveData !== 'undefined') {
          const prices = await LiveData.getCryptoPrices();
          if (active && prices && prices.bitcoin) {
            setBtc({
              price: prices.bitcoin.usd,
              change24h: prices.bitcoin.usd_24h_change,
            });
          }
          const fg = await LiveData.getFearGreed();
          if (active && fg && fg.data && fg.data[0]) {
            setFng({
              value: parseInt(fg.data[0].value, 10),
              classification: fg.data[0].value_classification,
            });
          }
        }
      } catch (_) { /* silent — screens fall back to mocks */ }
    }
    tick();
    const iv = setInterval(tick, 60_000);
    return () => { active = false; clearInterval(iv); };
  }, []);

  if (!btc && !fng) return null;

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 14,
      fontFamily: T.mono, fontSize: 11, color: T.textMid,
    }}>
      {btc && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ color: '#F7931A', fontSize: 10 }}>●</span>
          <span style={{ color: T.textDim, letterSpacing: 0.4 }}>BTC</span>
          <span style={{ color: T.text, fontWeight: 600 }}>
            ${Math.round(btc.price).toLocaleString('en-US')}
          </span>
          <span style={{
            color: btc.change24h >= 0 ? '#6FCF8E' : '#D96B6B',
            fontSize: 10.5, fontWeight: 500,
          }}>
            {btc.change24h >= 0 ? '+' : ''}{btc.change24h.toFixed(2)}%
          </span>
        </div>
      )}
      {fng && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ color: T.textDim, letterSpacing: 0.4 }}>F&amp;G</span>
          <span style={{ color: T.text, fontWeight: 600 }}>{fng.value}</span>
          <span style={{ color: T.textDim, fontSize: 10, letterSpacing: 0.3, textTransform: 'uppercase' }}>
            {fng.classification}
          </span>
        </div>
      )}
    </div>
  );
}

function TRWrap({ tab, onNav, onOpenSettings, children }) {
  return (
    <div style={{ background: TR_TOKENS.ink000, minHeight: 820 }}>
      <TRHeader tab={tab} onNav={onNav} onOpenSettings={onOpenSettings} />
      {children}
    </div>
  );
}

function TradeRadarApp() {
  const [tab, setTab] = React.useState('summary');
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [optionsOpen, setOptionsOpen] = React.useState(false);
  const [optionsInitialSymbol, setOptionsInitialSymbol] = React.useState(null);
  const [tradeOpen, setTradeOpen] = React.useState(false);
  const openSettings = () => setSettingsOpen(true);
  const openOptions  = (symbol) => { if (symbol) setOptionsInitialSymbol(symbol); setOptionsOpen(true); };
  const openTrade    = () => setTradeOpen(true);

  // Global triggers — any screen can open Settings, the Tradier chain, or the trade modal.
  React.useEffect(() => {
    window.openTRSettings = openSettings;
    window.openTROptions  = openOptions;
    window.openTRTrade    = openTrade;
  }, []);

  let screen;
  // Screens that render their own TR header via onNav
  if (tab === 'summary')         screen = <SummaryScreen          onNav={setTab} />;
  else if (tab === 'historical') screen = <HistoricalScreen       onNav={setTab} />;
  else if (tab === 'projected')  screen = <ProjectedScreen        onNav={setTab} />;
  else if (tab === 'impact')     screen = <ImpactScreen           onNav={setTab} />;
  else if (tab === 'recommend')  screen = <RecommendationsScreen  onNav={setTab} />;
  // News/Calendar/Signals now render their own 7-tab header + onNav — no TRWrap
  else if (tab === 'news')     screen = <NewsScreen     onNav={setTab} />;
  else if (tab === 'calendar') screen = <CalendarScreen onNav={setTab} />;
  else if (tab === 'signals')  screen = <SignalsScreen  onNav={setTab} />;
  else if (tab === 'prices')   screen = <PricesScreen   onNav={setTab} />;
  else if (tab === 'flights')  screen = <FlightsScreen  onNav={setTab} />;
  else screen = <SummaryScreen onNav={setTab} />;

  return (
    <>
      <div className="tr-shell">{screen}</div>
      <TRSettingsSheet open={settingsOpen} onClose={() => setSettingsOpen(false)} />
      <TROptionsChain open={optionsOpen} onClose={() => setOptionsOpen(false)} initialSymbol={optionsInitialSymbol} />
      <TRWelcome />
      <TRTradeModal open={tradeOpen} onClose={() => setTradeOpen(false)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TradeRadarApp />);
</script>
</body>
</html>
